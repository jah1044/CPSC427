<!DOCTYPE html>
<!-- ==========================================================
 Photo Editor Capstone Project
 File: editor.html
 Description: Canvas image editor page with tools, filters, export, and version history.
 Date: 04/2026
========================================================== -->
<html>
<!-- Page metadata, stylesheet links, and JavaScript imports -->
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/editor.css" />
    <title>Image Editor</title>
    <script src="../js/api.js" defer></script>
    <script src="../js/filters.js" defer></script>
    <script src="../js/editor.js" defer></script>
</head>

<!-- Main visible page content starts here -->
<body>
<div class="header-bar">
    <button onclick="location.href='dashboard.html'"><Back</button>
    <h3 id="editorTitle">Image Editor</h3>
    <button id="saveVersionButton" onclick="saveCurrentVersion()">Save New Version</button>
</div>

<!-- Editor tool panel with adjustments, filters, and export controls -->
<div class="tools">
    <h3>Adjustments</h3>

    <label>Scale</label>
    <input type="range" id="scale" min="10" max="200" value="100">

    <label>Brightness</label>
    <input type="range" id="br" min="0" max="200" value="100">

    <label>Contrast</label>
    <input type="range" id="contrast" min="0" max="200" value="100">

    <h3>RGB Balance</h3>
    <label>Red</label>
    <input type="range" id="rBalance" min="0" max="200" value="100">

    <label>Green</label>
    <input type="range" id="gBalance" min="0" max="200" value="100">

    <label>Blue</label>
    <input type="range" id="bBalance" min="0" max="200" value="100">

    <h3>Filters</h3>
    <button onclick="applySepia()">Sepia</button>
    <button onclick="applyBlur()">Blur</button>
    <button onclick="applyEdgeDetection()">Edge</button>
    <button onclick="applyGrayscale()">Grayscale</button>
    <button onclick="applySharpen()">Sharpen</button>

    <h3>Export</h3>
    <button onclick="downloadImage('png')">PNG</button>
</div>

<!-- Main page content area -->
<main>
    <!-- Canvas where the image is drawn and edited -->
<canvas id="editorCanvas"></canvas>
</main>

<!-- Version history panel for saved image versions -->
<aside id="versionsPanel">
    <h4>Versions</h4>
    <div id="versionList"></div>
</aside>
</body>
</html>
