<html lang="en">
<!-- Page metadata, stylesheet links, and JavaScript imports -->
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photo Editor - Login</title>
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/login.css" />
  <script src="../js/api.js" defer></script>
  <script src="../js/auth.js" defer></script>
</head>
<!-- Main visible page content starts here -->
<body class="auth-page">
  <!-- Main page content area -->
<main class="auth-shell">
    <section class="auth-card">
      <div class="auth-card__header">
        <h1>Welcome Back</h1>
        <p>Log in to manage projects, upload images, and continue editing.</p>
      </div>

      <!-- Form used to collect user input -->
<form id="loginForm" class="auth-form">
        <label for="loginEmail">Email</label>
        <input id="loginEmail" name="email" type="email" placeholder="you@example.com" required />

        <label for="loginPassword">Password</label>
        <input id="loginPassword" name="password" type="password" placeholder="Enter your password" required />

        <button type="submit" class="button button--primary">Log In</button>
      </form>

      <p class="auth-link-row">
        Need an account?
        <a href="register.html">Create one here</a>
      </p>

      <p id="authMessage" class="auth-message" aria-live="polite"></p>
    </section>
  </main>
</body>
</html>
