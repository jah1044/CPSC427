<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Editor Register</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/api.js" defer></script>
    <script src="js/auth.js" defer></script>
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <h1>Create Account</h1>
            <p class="auth-subtitle">Register a new account for the photo editor.</p>

            <form id="registerForm" class="auth-form">
                <label for="registerUsername">Username</label>
                <input type="text" id="registerUsername" name="username" placeholder="Choose a username" required>

                <label for="registerEmail">Email</label>
                <input type="email" id="registerEmail" name="email" placeholder="Enter your email" required>

                <label for="registerPassword">Password</label>
                <input type="password" id="registerPassword" name="password" placeholder="Create a password" required>

                <button type="submit">Register</button>
            </form>

            <p id="registerMessage" class="auth-message"></p>

            <p class="auth-switch">
                Already have an account?
                <a href="index.html">Go to login</a>
            </p>
        </div>
    </div>
</body>
</html>
