<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photo Editor - Register</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="js/api.js" defer></script>
  <script src="js/auth.js" defer></script>
</head>
<body class="auth-page">
  <main class="auth-shell">
    <section class="auth-card">
      <div class="auth-card__header">
        <h1>Create Account</h1>
        <p>Register to upload, organize, and version your edited images.</p>
      </div>

      <form id="registerForm" class="auth-form">
        <label for="registerUsername">Username</label>
        <input id="registerUsername" name="username" type="text" placeholder="Choose a username" required />

        <label for="registerEmail">Email</label>
        <input id="registerEmail" name="email" type="email" placeholder="you@example.com" required />

        <label for="registerPassword">Password</label>
        <input id="registerPassword" name="password" type="password" placeholder="Create a password" required />

        <button type="submit" class="button button--primary">Register</button>
      </form>

      <p class="auth-link-row">
        Already have an account?
        <a href="index.html">Go to login</a>
      </p>

      <p id="authMessage" class="auth-message" aria-live="polite"></p>
    </section>
  </main>
</body>
</html>
