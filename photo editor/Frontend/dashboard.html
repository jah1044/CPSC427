<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body class="dashboard-body">
  <div class="dashboard-layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-logo">PE</div>
        <div>
          <h2>Photo Editor</h2>
          <p>Creative workspace</p>
        </div>
      </div>

      <nav class="sidebar-nav">
        <button data-scroll-target="projectsSection">Home</button>
        <button data-scroll-target="projectsSection">All Projects</button>
        <button data-scroll-target="learningSection">Learning</button>
      </nav>
    </aside>

    <!-- Main -->
    <main class="dashboard-main">

      <!-- Top bar -->
      <div class="topbar">
        <div>
          <h2>Dashboard</h2>
          <p id="displayUsername">User</p>
          <p id="displayEmail">email</p>
        </div>

        <button id="logoutButton" class="logout-btn">Log Out</button>
      </div>

      <!-- Upload -->
      <section id="uploadPanel" class="panel">
        <h3>Upload Image</h3>
        <input type="text" id="title" placeholder="Title" />
        <input type="file" id="image" />
        <button id="uploadButton" class="primary-btn">Upload</button>
      </section>

      <!-- Bulk Actions -->
      <section class="panel">
        <h3>Bulk Actions</h3>
        <button id="selectAllButton">Select All</button>
        <button id="clearSelectionButton">Clear</button>
        <button id="bulkDeleteButton" class="danger-btn">Delete Selected</button>
      </section>

      <!-- Continue Editing -->
      <section class="panel">
        <h3>Continue Editing</h3>
        <div id="continueEditingRow"></div>
      </section>

      <!-- Projects -->
      <section class="panel" id="projectsSection">
        <h3>All Projects</h3>

        <input id="projectSearchInput" placeholder="Search..." />

        <div id="projectsGrid"></div>
      </section>

      <!-- Learning -->
      <section class="panel" id="learningSection">
        <h3>Learning Widget</h3>

        <ul>
          <li>Save versions before editing</li>
          <li>Use PNG for better quality</li>
          <li>Adjust brightness slowly</li>
        </ul>
      </section>

    </main>
  </div>

  <script src="js/api.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
